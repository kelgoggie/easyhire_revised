<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EasyHire{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- EasyHire Brand Colors (Iloilo-themed) -->
    <script>
                tailwind.config = {
        theme: {
            extend: {
            colors: {
                primary:   '#1A2F5A',   // navy
                accent:    '#2B5BA8',   // iloilo blue
                teal:      '#5B8DD9',   // sky blue (replaces old teal)
                teallight: '#A8C3F0',   // lighter sky
                amber:     '#D4A017',   // iloilo gold (replaces old amber)
                muted:     '#6B7B8D',   // slate
                surface:   '#F4F6FA',   // cloud white
                taupe:     '#B8C5D6',   // steel blue-grey
                olive:     '#C0C195',   // kept for employer "Hire" text
            },
            fontFamily: {
                sans: ['Inter', 'sans-serif'],
            },
            }
        }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body class="font-sans">
    {% block navbar %}{% endblock %}

    {% block iloilo_header %}{% endblock %}  {# landing pages override this block with the banner #}

    {% block content %}{% endblock %}
    {% block footer %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
