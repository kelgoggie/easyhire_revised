<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EasyHire{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- EasyHire Brand Colors (Iloilo-themed) -->
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary:   '#2D4A3E',   // dark forest green
                    teal:      '#4A9B8E',   // teal accent
                    teallight: '#8BBDB7',   // light teal
                    amber:     '#E8A838',   // amber CTA
                    muted:     '#595959',   // dark grey
                    surface:   '#F5F2EB',   // warm off-white
                    taupe:     '#C4B9B0',   // taupe
                    olive:     '#C0C195',   // olive
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                },
            }
        }
    }
</script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body class="font-sans">
    {% block navbar %}{% endblock %}
    {% block partner_logos %}{% endblock %}
    {% block content %}{% endblock %}
    {% block footer %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
