    <div class="w-px h-6 bg-taupe/40"></div>
    <div class="flex items-center gap-2">
        <div class="w-14 h-14 rounded-full bg-taupe/20 border border-taupe/40 flex items-center justify-center overflow-hidden">
            <img src="{% static 'images/iloilo_logo.png' %}" alt="Iloilo City" class="w-full h-full object-contain" onerror="this.style.display='none'">
        </div>
        <span class="text-xs text-muted font-medium leading-tight">Iloilo City<br>Government</span>
    </div>
</div>
