{% load static %}
<nav class="fixed top-0 left-0 right-0 z-50 bg-surface px-8 py-3 flex items-center justify-between shadow-md">

    <!-- Left: Logo -->
    <a href="/dashboard/" class="flex items-center gap-2">
        <img src="{% static 'images/navbar_logo.svg' %}" alt="EasyHire" class="w-9 h-9">
        <span class="font-bold text-xl">
            <span class="text-primary">Easy</span><span class="text-teal">Hire</span><span class="text-primary">.</span>
        </span>
    </a>

    <!-- Center: Nav Icons -->
    <div class="flex items-center gap-2">
        <a href="/dashboard/"
           class="w-11 h-11 flex items-center justify-center rounded-xl transition bg-primary
                  {% if active == 'home' %}ring-2 ring-offset-1 ring-primary{% endif %}">
            <img src="{% static 'images/icons/icon_home.svg' %}" class="w-5 h-5 brightness-0 invert">
        </a>
        <a href="/resume/"
           class="w-11 h-11 flex items-center justify-center rounded-xl transition
                  {% if active == 'resume' %}ring-2 ring-offset-1 ring-primary{% else %}hover:bg-taupe/30{% endif %}">
            <img src="{% static 'images/icons/icon_resume.svg' %}"
                 class="w-5 h-5 {% if active == 'resume' %}brightness-0 saturate-0{% endif %}">
        </a>
        <a href="/jobs/for-you/"
           class="w-11 h-11 flex items-center justify-center rounded-xl transition
                  {% if active == 'jobs' %}ring-2 ring-offset-1 ring-primary{% else %}hover:bg-taupe/30{% endif %}">
            <img src="{% static 'images/icons/icon_jobs.svg' %}"
                 class="w-5 h-5 {% if active == 'jobs' %}brightness-0 saturate-0{% endif %}">
        </a>
        <a href="/analytics/"
           class="w-11 h-11 flex items-center justify-center rounded-xl transition
                  {% if active == 'analytics' %}ring-2 ring-offset-1 ring-primary{% else %}hover:bg-taupe/30{% endif %}">
            <img src="{% static 'images/icons/icon_analytics.svg' %}"
                 class="w-5 h-5 {% if active == 'analytics' %}brightness-0 saturate-0{% endif %}">
        </a>
    </div>

    <!-- Right: Bell, Messages, Avatar -->
    <div class="flex items-center gap-2">

        <!-- Notifications Bell -->
        <div class="relative" id="notif-container">
            <button id="notif-btn"
                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-taupe/30 transition relative">
                <img src="{% static 'images/icons/icon_bell.svg' %}" class="w-5 h-5">
                <span id="notif-dot" class="absolute top-1.5 right-1.5 w-2 h-2 bg-amber rounded-full hidden"></span>
            </button>

            <!-- Dropdown -->
            <div id="notif-dropdown"
                 class="absolute right-0 top-12 bg-white rounded-2xl shadow-xl w-80 z-50 border border-taupe/20 hidden overflow-hidden">
                <div class="flex items-center justify-between px-4 py-3 border-b border-taupe/20">
                    <p class="font-bold text-primary text-sm">Notifications</p>
                    <button onclick="markAllRead()" class="text-teal text-xs hover:underline">Mark all as read</button>
                </div>
                <div id="notif-list" class="max-h-80 overflow-y-auto">
                    <p class="text-muted text-xs text-center py-6">No new notifications</p>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <a href="/messages/"
           class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-taupe/30 transition relative">
            <img src="{% static 'images/icons/icon_messages.svg' %}" class="w-5 h-5">
            {% if unread_messages %}
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-amber rounded-full"></span>
            {% endif %}
        </a>

        <!-- Profile Avatar + More -->
        <div class="relative" id="more-menu-container">
            <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold text-sm cursor-pointer">
                <img src="{% static 'images/icons/icon_profile.svg' %}" class="w-5 h-5">
            </div>
            <button id="more-menu-btn"
                    class="absolute -bottom-1 -right-1 w-5 h-5 bg-white rounded-full shadow-md flex items-center justify-center hover:bg-surface transition border border-taupe/20">
                <img src="{% static 'images/icons/icon_more.svg' %}" class="w-3 h-3">
            </button>
            <div id="more-menu-dropdown"
                 class="absolute right-0 top-12 bg-white rounded-2xl shadow-lg py-2 w-52 z-50 border border-taupe/20 hidden">
                <div class="px-4 py-2 mb-1 border-b border-taupe/20">
                    <p class="font-semibold text-primary text-sm">
                        {{ request.user.jobseeker_profile.first_name }} {{ request.user.jobseeker_profile.last_name }}
                    </p>
                    <p class="text-muted text-xs truncate">{{ request.user.email }}</p>
                </div>
                <a href="/profile/" class="flex items-center gap-3 px-4 py-2 text-sm text-primary hover:bg-surface transition">
                    <img src="{% static 'images/icons/icon_profile.svg' %}" class="w-4 h-4 opacity-60">
                    View Profile
                </a>
                <a href="/settings/" class="flex items-center gap-3 px-4 py-2 text-sm text-primary hover:bg-surface transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-60" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.01 7.01 0 00-1.62-.94l-.36-2.54A.484.484 0 0014 2h-4a.484.484 0 00-.48.41l-.36 2.54a7.27 7.27 0 00-1.62.94l-2.39-.96a.48.48 0 00-.59.22L2.74 8.87a.47.47 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.47.47 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.05.24.27.41.48.41h4c.24 0 .44-.17.47-.41l.36-2.54a7.27 7.27 0 001.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 00-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 110-7.2 3.6 3.6 0 010 7.2z"/>
                    </svg>
                    Account Settings
                </a>
                <hr class="my-1 border-taupe/20">
                <a href="/logout/" class="flex items-center gap-3 px-4 py-2 text-sm text-red-500 hover:bg-surface transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4a2 2 0 00-2 2v14a2 2 0 002 2h8v-2H4V5z"/>
                    </svg>
                    Log Out
                </a>
            </div>
        </div>

    </div>
</nav>

<script>
    // ── Profile dropdown ───────────────────────────────────────────
    const moreBtn = document.getElementById('more-menu-btn');
    const moreDropdown = document.getElementById('more-menu-dropdown');
    moreBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        moreDropdown.classList.toggle('hidden');
    });

    // ── Notification bell ──────────────────────────────────────────
    const notifBtn = document.getElementById('notif-btn');
    const notifDropdown = document.getElementById('notif-dropdown');
    const notifDot = document.getElementById('notif-dot');
    const notifList = document.getElementById('notif-list');

    notifBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        notifDropdown.classList.toggle('hidden');
    });

    document.addEventListener('click', function() {
        moreDropdown.classList.add('hidden');
        notifDropdown.classList.add('hidden');
    });

    function renderNotifications(notifications) {
        if (!notifications.length) {
            notifList.innerHTML = '<p class="text-muted text-xs text-center py-6">No new notifications</p>';
            notifDot.classList.add('hidden');
            return;
        }

        notifDot.classList.remove('hidden');
        notifList.innerHTML = notifications.map(n => `
            <a href="${n.url}" onclick="markRead(${n.id})"
               class="block px-4 py-3 hover:bg-surface transition border-b border-taupe/10 last:border-0">
                <p class="text-sm text-primary font-medium leading-snug">${n.text}</p>
                ${n.subtext ? `<p class="text-xs text-muted mt-0.5">${n.subtext}</p>` : ''}
                <p class="text-xs text-taupe mt-1">${n.created_at}</p>
            </a>
        `).join('');
    }

    function fetchNotifications() {
        fetch('/api/notifications/')
            .then(r => r.json())
            .then(data => renderNotifications(data.notifications))
            .catch(() => {});
    }

    function markRead(id) {
        fetch(`/api/notifications/${id}/read/`, { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
    }

    function markAllRead() {
        fetch('/api/notifications/read-all/', { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') } })
            .then(() => {
                notifList.innerHTML = '<p class="text-muted text-xs text-center py-6">No new notifications</p>';
                notifDot.classList.add('hidden');
            });
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    // Poll every 15 seconds
    fetchNotifications();
    setInterval(fetchNotifications, 15000);
</script>

<div class="h-[68px]"></div>
