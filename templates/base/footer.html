{% load static %}
<footer class="bg-gray-900 py-8 px-12">
    <div class="max-w-6xl mx-auto">
        <div class="flex items-start gap-12">

            <!-- Left: Logos -->
            <div class="flex items-center gap-4 flex-shrink-0 mt-1">
                <img src="{% static 'images/iloilo_logo.png' %}" alt="Iloilo" class="h-14 w-auto">
                <img src="{% static 'images/peso_logo.png' %}" alt="PESO" class="h-14 w-auto">
                <img src="{% static 'images/cpu_logo.png' %}" alt="Central Philippine University" class="h-14 w-auto">
            </div>

            <!-- Center: EasyHire description -->
            <div class="flex-1">
                <p class="text-white font-extrabold text-lg mb-2">EasyHire.</p>
                <p class="text-white/70 text-xs leading-relaxed mb-2">
                    The official digital platform Public Employment Services Office<br>
                    (PESO) Iloilo Provincial Government.
                </p>
            </div>


            <!-- Follow Us -->
            <div class="flex-shrink-0">
                <p class="text-white font-bold text-xs mb-3 tracking-wide">FOLLOW US</p>
                <div class="flex items-center gap-3">
                    <!-- Facebook -->
                    <a href="#" class="text-white/60 hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
                        </svg>
                    </a>
                    <!-- Email -->
                    <a href="mailto:info@easyhire.gov.ph" class="text-white/60 hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                        </svg>
                    </a>
                </div>
            </div>

        </div>
    </div>
</footer>
